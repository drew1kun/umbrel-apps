[[outputs.influxdb_v2]]
  urls = ["$INFLUX_ENDPOINT"]
  token = "$INFLUX_TOKEN"
  organization = "cipherpunk"
  bucket = "system_metrics"
  namepass = ["cpu", "disk", "diskio", "kernel", "mem", "processes", "swap", "system", "net", "smart", "temp"]
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = false
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]
[[inputs.diskio]]
[[inputs.kernel]]
[[inputs.mem]]
[[inputs.processes]]
[[inputs.swap]]
[[inputs.system]]
[[inputs.net]]
[[inputs.temp]]
[[inputs.smart]]
  path_smartctl = "/usr/sbin/smartctl"
  use_sudo = false
